<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Student Marks</title>
    </head>
    <body>
        <h2>Student Results</h2>
        <p id="output"></p>
        <script>
            let studentName=" Arun";

            let marks1=85;
            let marks2=90;
            let marks3=88;

            const calculateTotal=(m1,m2,m3)=>m1+m2+m3;
            const calculateAverage=(m1,m2,m3)=>(m1+m2+m3)/3;

            let total=calculateTotal(marks1,marks2,marks3);
            let average=calculateAverage(marks1,marks2,marks3);
            
            document.getElementById("output").innerHTML =`
            StudentName:${studentName} <br>
            Total:${total}<br>
            Average:${average}<br>


            `;


        </script>
    </body>

</html>
